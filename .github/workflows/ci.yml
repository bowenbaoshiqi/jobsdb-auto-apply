name: CI

on:
  push:
    branches: [main, feature/v1.0, feature/v2.0]
  pull_request:
    branches: [main, feature/v1.0]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Create venv and install deps
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install pytest-cov

      # CI 只跑 unit + characterization,不装 playwright chromium(不起浏览器)
      # v2.0 阶段5: 覆盖率已达 65%+,pyproject [tool.coverage.report] fail_under=60 生效
      - name: Run tests (unit + characterization only)
        run: uv run pytest -m 'not e2e' --cov=src --cov-report=term-missing

  # v2.0 阶段5 启用: ruff 错误已清零(--fix + 手动处理),CI 卡 lint
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.13
      - name: Create venv and install deps
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Lint with ruff
        run: uv run ruff check src/ tests/
